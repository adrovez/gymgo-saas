<aside
  class="flex flex-col h-full shrink-0"
  style="
    width: var(--sidebar-width);
    background: var(--color-sidebar-bg);
    color: var(--color-sidebar-fg);
    border-right: 1px solid var(--color-sidebar-border);
  "
  aria-label="Navegación principal"
>

  <!-- Logo -->
  <div class="flex items-center gap-3 px-5 py-5"
       style="border-bottom: 1px solid var(--color-sidebar-border)">
    <div class="flex items-center justify-center w-9 h-9 rounded-xl shrink-0"
         style="background: var(--color-primary)">
      <svg class="w-5 h-5" style="color: white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064" />
      </svg>
    </div>
    @if (!collapsed()) {
      <span class="font-bold text-lg tracking-tight" style="color: var(--color-sidebar-fg-strong)">GymGo</span>
    }
  </div>

  <!-- Nav items -->
  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto" aria-label="Menú principal">
    @for (item of visibleNavItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="sidebar-nav-active"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="onLinkClick()"
        class="sidebar-nav-item flex items-center gap-3 px-3 rounded-lg text-sm font-medium
               border border-transparent transition-colors"
        style="
          min-height: var(--touch-target, 44px);
          color: var(--color-sidebar-fg);
          transition-duration: var(--duration-fast);
        "
      >
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" [attr.d]="item.icon" />
        </svg>
        @if (!collapsed()) {
          <span>{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- User info + Logout -->
  <div class="px-3 py-4" style="border-top: 1px solid var(--color-sidebar-border)">
    @if (session(); as s) {
      <div class="flex items-center gap-3 px-3 py-2 mb-1 rounded-lg">
        <!-- Avatar -->
        <div class="w-8 h-8 rounded-full flex items-center justify-center font-semibold text-sm shrink-0"
             style="background: var(--color-primary); color: white"
             aria-hidden="true">
          {{ s.fullName.charAt(0).toUpperCase() }}
        </div>
        @if (!collapsed()) {
          <div class="min-w-0">
            <p class="text-sm font-medium truncate" style="color: var(--color-sidebar-fg-strong)">{{ s.fullName }}</p>
            <p class="text-xs truncate" style="color: var(--color-sidebar-fg)">{{ s.email }}</p>
          </div>
        }
      </div>
    }

    <!-- Logout button -->
    <button
      type="button"
      (click)="logout()"
      class="w-full flex items-center gap-3 px-3 rounded-lg text-sm font-medium
             border border-transparent transition-colors sidebar-logout-btn"
      style="
        min-height: var(--touch-target, 44px);
        color: var(--color-sidebar-fg);
        transition-duration: var(--duration-fast);
      "
      aria-label="Cerrar sesión"
    >
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      @if (!collapsed()) {
        <span>Cerrar sesión</span>
      }
    </button>
  </div>
</aside>
