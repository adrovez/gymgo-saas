<div class="p-6 max-w-lg mx-auto space-y-6">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Nueva sesión</h1>
      <p class="page-description">Selecciona el socio y la fecha para comenzar.</p>
    </div>
    <a routerLink="/app/workout-logs" class="btn btn-ghost btn-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Volver
    </a>
  </div>

  <!-- Error -->
  @if (error()) {
    <div class="alert alert-error" role="alert">
      <svg class="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
      </svg>
      <span>{{ error() }}</span>
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="card p-6 space-y-5" novalidate>

    <!-- Socio -->
    <div>
      <label class="form-label" for="memberId">
        Socio <span style="color: var(--color-error)">*</span>
      </label>
      <select id="memberId" formControlName="memberId" class="input w-full"
              [class.input-error]="isInvalid('memberId')">
        <option value="">
          @if (loadingMembers()) { Cargando socios… } @else { — Selecciona un socio — }
        </option>
        @for (m of members(); track m.id) {
          <option [value]="m.id">{{ m.fullName }} — {{ m.rut }}</option>
        }
      </select>
      @if (hasError('memberId', 'required')) {
        <p class="form-error">Selecciona un socio.</p>
      }
    </div>

    <!-- Fecha + Título en grid -->
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
      <div>
        <label class="form-label" for="date">
          Fecha <span style="color: var(--color-error)">*</span>
        </label>
        <input id="date" type="date" formControlName="date" class="input w-full"
               [class.input-error]="isInvalid('date')"/>
        @if (hasError('date', 'required')) {
          <p class="form-error">La fecha es obligatoria.</p>
        }
      </div>

      <div>
        <label class="form-label" for="title">
          Título
          <span class="text-xs font-normal" style="color: var(--color-muted-fg)">(opcional)</span>
        </label>
        <input id="title" type="text" formControlName="title"
               placeholder="Ej: Push A, Full Body semana 3…"
               class="input w-full" maxlength="200"/>
      </div>
    </div>

    <!-- Acciones -->
    <div class="flex justify-end gap-3 pt-2" style="border-top: 1px solid var(--color-border)">
      <a routerLink="/app/workout-logs" class="btn btn-ghost">Cancelar</a>
      <button type="submit" class="btn btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner spinner-sm" style="border-top-color: white; border-color: rgba(255,255,255,0.3)"></span>
          Creando…
        } @else {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          Crear sesión
        }
      </button>
    </div>

  </form>
</div>
