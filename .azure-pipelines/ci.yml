# .azure-pipelines/ci.yml
# Pipeline de Integracion Continua — GymGo SaaS
# Se ejecuta automaticamente al abrir o actualizar un PR hacia develop o main.
# Debe pasar obligatoriamente para poder completar el PR.

trigger: none  # Solo se activa por Pull Requests, no por push directo

pr:
  branches:
    include:
      - develop
      - main

pool:
  vmImage: 'windows-latest'  # SQL Server se ejecuta en Windows

variables:
  buildConfiguration: 'Release'

steps:

  - task: UseDotNet@2
    displayName: 'Instalar .NET 8 SDK'
    inputs:
      version: '8.0.x'

  - task: DotNetCoreCLI@2
    displayName: 'Restaurar dependencias'
    inputs:
      command: 'restore'
      projects: '**/*.csproj'

  - task: DotNetCoreCLI@2
    displayName: 'Compilar solucion'
    inputs:
      command: 'build'
      projects: '**/*.csproj'
      arguments: '--configuration $(buildConfiguration) --no-restore'

  - task: DotNetCoreCLI@2
    displayName: 'Ejecutar tests unitarios'
    inputs:
      command: 'test'
      projects: 'tests/GymGo.UnitTests/*.csproj'
      arguments: '--configuration $(buildConfiguration) --no-build'

  - task: DotNetCoreCLI@2
    displayName: 'Ejecutar tests de integracion'
    inputs:
      command: 'test'
      projects: 'tests/GymGo.IntegrationTests/*.csproj'
      arguments: '--configuration $(buildConfiguration)'
    env:
      ConnectionStrings__Default: $(STAGING_DB_CONN_TEST)
