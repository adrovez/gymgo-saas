# .azure-pipelines/cd-production.yml
# Pipeline CD Production — GymGo SaaS
# Se activa al mergear hacia main.
# Requiere aprobacion manual en ADO Environments antes del deploy a produccion.

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  publishFolder: '$(Build.ArtifactStagingDirectory)/publish'

stages:

  # ─────────────────────────────────────
  #  STAGE 1: Build y publicacion
  # ─────────────────────────────────────
  - stage: Build
    displayName: 'Build y Publicar Artefacto'
    jobs:
      - job: BuildAndPublish
        displayName: 'Compilar y publicar API'
        steps:

          - task: UseDotNet@2
            displayName: 'Instalar .NET 8 SDK'
            inputs:
              version: '8.0.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restaurar y compilar'
            inputs:
              command: 'publish'
              publishWebProjects: true
              arguments: '--configuration Release --output $(publishFolder)'

          - publish: $(publishFolder)
            artifact: drop
            displayName: 'Publicar artefacto: drop'

  # ─────────────────────────────────────
  #  STAGE 2: Deploy a Produccion
  #  Requiere aprobacion manual en ADO Environments
  # ─────────────────────────────────────
  - stage: Deploy_Production
    displayName: 'Deploy a Produccion'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployProd
        displayName: 'Deploy SmarterASP.NET Production'
        environment: 'production'  # <- Configurar aprobadores en ADO Environments
        strategy:
          runOnce:
            deploy:
              steps:

                - task: DotNetCoreCLI@2
                  displayName: 'Aplicar migraciones EF Core a Production'
                  inputs:
                    command: 'custom'
                    custom: 'ef'
                    arguments: 'database update --project src/GymGo.Infrastructure --startup-project src/GymGo.API'
                  env:
                    ConnectionStrings__Default: $(PROD_DB_CONN)

                - task: WebDeploy@1
                  displayName: 'Deploy a SmarterASP.NET Production'
                  inputs:
                    Package: '$(Pipeline.Workspace)/drop/**/*.zip'
                    RemoveAdditionalFilesFlag: true
                    AdditionalArguments: >
                      /u:$(SMARTERASP_USER_PROD)
                      /p:$(SMARTERASP_PASS_PROD)
                      /m:https://$(SMARTERASP_SERVER_PROD):8172/MsDeploy.axd
